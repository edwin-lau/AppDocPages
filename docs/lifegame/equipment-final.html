<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
  <meta name="theme-color" content="#1a3325">
  <title>Life Game · 装备</title>
  <style>
    :root {
      --gold: #dcc480;
      --gold-bright: #e8c84a;
      --gold-dim: rgba(220, 196, 128, 0.45);
      --panel: rgba(12, 28, 18, 0.72);
      --slot-bg: rgba(8, 22, 14, 0.65);
      --font-min: 12px;
      --tier-white: #f4f4f4;
      --tier-green: #7fdc9e;
      --tier-blue: #7eb8ff;
      --tier-purple: #d4a8ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      width: 100%;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      font-size: max(var(--font-min), 2.8vw);
      line-height: 1.45;
      color: #eef6ee;
      background: #070a08;
      padding: 8px;
      overflow-x: hidden;
    }

    .screen {
      width: 100%;
      max-width: 100vw;
      min-height: calc(100vh - 16px);
      border-radius: 14px;
      border: 2px solid var(--gold-dim);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 36px rgba(0,0,0,0.55);
      position: relative;
    }

    .screen-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(155deg,
        #3d6b4e 0%,
        #2a5238 22%,
        #1a3828 52%,
        #0c1f14 100%);
      pointer-events: none;
    }

    .screen-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 50% at 50% -15%, rgba(0,0,0,0.4) 0%, transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 42%);
    }

    .top-bar {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(220, 196, 128, 0.28);
      background: rgba(6, 14, 10, 0.55);
      backdrop-filter: blur(8px);
      font-size: clamp(12px, 3.2vw, 15px);
    }

    .btn-back {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--gold-dim);
      background: rgba(0,0,0,0.38);
      color: var(--gold);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      transition: background 0.25s, transform 0.2s, border-color 0.25s;
    }

    .btn-back:active { transform: scale(0.96); }
    .btn-back:hover {
      background: rgba(220, 196, 128, 0.12);
      border-color: var(--gold);
    }

    .top-title {
      justify-self: center;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--gold-bright);
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
      white-space: nowrap;
    }

    .coins-bar {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(232, 200, 74, 0.35);
      background: rgba(0,0,0,0.35);
      color: var(--gold-bright);
      font-weight: 700;
      white-space: nowrap;
    }

    .main-row {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      min-height: 0;
      gap: 8px;
      padding: 10px;
    }

    /* 左侧：角色居中 + 槽位环绕（约 55%） */
    .col-figure-ring {
      flex: 0 0 55%;
      max-width: 55%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
    }

    .equip-arena {
      position: relative;
      width: 100%;
      max-width: min(100%, 440px);
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      max-height: min(52vh, 420px);
    }

    .equip-links {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
    }

    .equip-links .link-line {
      stroke: var(--gold);
      stroke-width: 0.45;
      stroke-dasharray: 1.35 0.85;
      stroke-linecap: round;
      opacity: 0.72;
      vector-effect: non-scaling-stroke;
    }

    .col-stats {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    /* 角色展示区（位于环绕区中心） */
    .figure-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: 44%;
      height: 56%;
      min-height: 0;
      max-height: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 4px;
      pointer-events: none;
    }

    .figure-glow {
      position: absolute;
      inset: 8% 10%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 45%, rgba(232, 200, 74, 0.22) 0%, transparent 65%);
      animation: pulseGlow 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.75; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    .student {
      position: relative;
      width: min(88%, 150px);
      height: min(88%, 200px);
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45));
    }

    .student-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      animation: idle-breathe 0.8s steps(1) infinite;
    }

    @keyframes idle-breathe {
      0%, 100% { content: url("assets/player/freeknight_idle_0.png"); }
      20% { content: url("assets/player/freeknight_idle_2.png"); }
      40% { content: url("assets/player/freeknight_idle_4.png"); }
      60% { content: url("assets/player/freeknight_idle_6.png"); }
      80% { content: url("assets/player/freeknight_idle_8.png"); }
    }
      transform: translateX(-50%);
      width: 58%;
      height: 38%;
      border-radius: 10px 10px 6px 6px;
      background: linear-gradient(180deg, #e8eef5 0%, #c8d4e8 55%, #a8b8d4 100%);
    /* 装备部位发光点（示意已穿戴）*/
    .equip-hotspot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s;
    }

    .equip-hotspot.on {
      opacity: 1;
      animation: hotspotPulse 2s ease-in-out infinite;
    }

    @keyframes hotspotPulse {
      0%, 100% { box-shadow: 0 0 6px rgba(232, 200, 74, 0.55); transform: scale(1); }
      50% { box-shadow: 0 0 18px rgba(232, 200, 74, 0.95); transform: scale(1.08); }
    }

    .hotspot-helmet { left: 38%; top: 10%; width: 26%; aspect-ratio: 1; border: 2px solid rgba(232, 200, 74, 0.65); }
    .hotspot-armor { left: 28%; top: 46%; width: 44%; height: 26%; border-radius: 12px; border: 2px solid rgba(232, 200, 74, 0.55); }
    .hotspot-bracer-l { left: 10%; top: 52%; width: 14%; height: 12%; border: 2px solid rgba(232, 200, 74, 0.45); }
    .hotspot-bracer-r { right: 8%; top: 52%; width: 14%; height: 12%; border: 2px solid rgba(232, 200, 74, 0.45); }
    .hotspot-leg { left: 30%; bottom: 22%; width: 38%; height: 14%; border-radius: 8px; border: 2px solid rgba(232, 200, 74, 0.45); }
    .hotspot-shoe { left: 26%; bottom: 10%; width: 48%; height: 10%; border-radius: 8px; border: 2px solid rgba(232, 200, 74, 0.45); }

    .hotspot-glove {
      left: 6%;
      top: 54%;
      width: 18%;
      height: 12%;
      border-radius: 8px;
      border: 2px solid rgba(232, 200, 74, 0.45);
    }

    @keyframes slotGlowPiece {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.12); }
    }

    .char-meta {
      text-align: center;
      margin-top: 2px;
      padding: 0 4px;
      font-size: clamp(12px, 3vw, 14px);
      flex-shrink: 0;
    }

    /* 槽位环绕层 */
    .slot-ring {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .slot-list {
      position: absolute;
      inset: 0;
      pointer-events: none;
      list-style: none;
    }

    .char-name {
      font-weight: 800;
      color: var(--gold-bright);
      letter-spacing: 0.06em;
    }

    .char-rank {
      margin-top: 4px;
      color: rgba(255,255,255,0.78);
      font-size: clamp(12px, 2.9vw, 13px);
    }

    .slot-btn {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 10px;
      border: 2px dashed rgba(220, 196, 128, 0.35);
      background: var(--slot-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        opacity 0.22s ease;
      flex-shrink: 0;
      padding: 0;
      font: inherit;
      color: inherit;
      pointer-events: auto;
      transform: translate(-50%, -50%);
    }

    .slot-btn.weapon-slot {
      width: 56px;
      height: 58px;
      border-style: solid;
      border-color: rgba(232, 200, 74, 0.55);
    }

    .slot-btn.equipped {
      border-style: solid;
      border-color: rgba(232, 200, 74, 0.65);
      opacity: 1;
    }

    .slot-btn.empty {
      opacity: 0.55;
    }

    .slot-btn.selected {
      transform: translate(-50%, -50%) scale(1.08);
      border-color: var(--gold-bright);
      box-shadow:
        0 0 0 2px rgba(232, 200, 74, 0.35),
        0 6px 18px rgba(0,0,0,0.45);
      z-index: 2;
    }

    .slot-emoji {
      font-size: 26px;
      line-height: 1;
    }

    .weapon-slot .slot-emoji {
      font-size: 30px;
    }

    /* 槽位方位（相对 equip-arena，与 SVG 端点一致） */
    .slot-pos-weapon { left: 90%; top: 50%; }
    .slot-pos-helmet { left: 50%; top: 9%; }
    .slot-pos-armor { left: 22%; top: 20%; }
    .slot-pos-bracers { left: 11%; top: 50%; }
    .slot-pos-legs { left: 22%; top: 80%; }
    .slot-pos-shoes { left: 50%; top: 91%; }
    .slot-pos-gloves { left: 78%; top: 80%; }

    .slot-lv {
      position: absolute;
      right: 2px;
      bottom: 2px;
      font-size: 9px;
      font-weight: 800;
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(0,0,0,0.55);
      line-height: 1.2;
    }

    .tier-white { color: var(--tier-white); }
    .tier-green { color: var(--tier-green); }
    .tier-blue { color: var(--tier-blue); }
    .tier-purple { color: var(--tier-purple); }

    /* 属性面板 */
    .stats-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--panel);
      border: 1px solid rgba(220, 196, 128, 0.35);
      border-radius: 12px;
      padding: 10px 12px;
      overflow-y: auto;
      min-height: 0;
    }

    .power-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(220, 196, 128, 0.22);
    }

    .power-label {
      font-size: clamp(13px, 3.4vw, 16px);
      font-weight: 700;
      color: rgba(255,255,255,0.88);
    }

    .power-num {
      font-size: clamp(26px, 7vw, 40px);
      font-weight: 900;
      color: var(--gold-bright);
      text-shadow: 0 2px 14px rgba(232, 200, 74, 0.35);
      letter-spacing: 0.04em;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      font-size: clamp(12px, 3vw, 14px);
    }

    .stat-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
    }

    .stat-cell span.val {
      font-weight: 700;
      color: #fff;
    }

    .hr {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(220, 196, 128, 0.45), transparent);
      margin: 4px 0;
    }

    .detail-block {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .detail-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .detail-title {
      font-weight: 800;
      font-size: clamp(13px, 3.3vw, 15px);
      margin-bottom: 6px;
      color: var(--gold);
    }

    .detail-meta {
      font-size: clamp(12px, 2.9vw, 13px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 8px;
    }

    .detail-lines {
      font-size: clamp(12px, 3vw, 14px);
      color: rgba(255,255,255,0.9);
      line-height: 1.55;
    }

    .btn-upgrade-inline {
      margin-top: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(232, 200, 74, 0.55);
      background: linear-gradient(180deg, rgba(232, 200, 74, 0.22) 0%, rgba(40, 60, 35, 0.85) 100%);
      color: var(--gold-bright);
      font-weight: 800;
      font-size: clamp(12px, 3vw, 14px);
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }

    .btn-upgrade-inline:active {
      transform: scale(0.98);
    }

    .set-box {
      margin-top: 4px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(220, 196, 128, 0.22);
      font-size: clamp(12px, 3vw, 13px);
      color: rgba(255,255,255,0.82);
      line-height: 1.55;
    }

    .set-box h4 {
      font-size: clamp(12px, 3vw, 13px);
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }

    /* 底部栏 */
    .bottom-bar {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      padding: 10px 12px 14px;
      border-top: 1px solid rgba(220, 196, 128, 0.22);
      background: rgba(6, 14, 10, 0.72);
      backdrop-filter: blur(8px);
    }

    .bottom-bar button {
      min-height: 44px;
      padding: 10px 22px;
      border-radius: 12px;
      font-weight: 800;
      font-size: clamp(12px, 3.2vw, 15px);
      cursor: pointer;
      border: 1px solid rgba(220, 196, 128, 0.45);
      transition: transform 0.2s, filter 0.2s, background 0.2s;
      font-family: inherit;
    }

    .bottom-bar button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(232, 200, 74, 0.35) 0%, rgba(45, 85, 55, 0.95) 100%);
      color: var(--gold-bright);
    }

    .btn-secondary {
      background: rgba(0, 0, 0, 0.42);
      color: rgba(255,255,255,0.88);
    }

    .btn-buy {
      background: linear-gradient(180deg, rgba(120, 180, 255, 0.35) 0%, rgba(35, 55, 95, 0.92) 100%);
      color: #cfe6ff;
      border-color: rgba(140, 190, 255, 0.45);
    }

    .bottom-bar.hidden-actions {
      visibility: hidden;
      min-height: 52px;
      pointer-events: none;
    }

    /* 竖屏：上角色+环绕，下属性 */
    @media (max-width: 720px), (orientation: portrait) {
      .main-row {
        flex-direction: column;
        align-items: stretch;
      }

      .col-figure-ring {
        flex: 0 0 auto;
        max-width: 100%;
        width: 100%;
      }

      .equip-arena {
        max-width: min(100%, 360px);
        max-height: min(42vh, 340px);
      }

      .figure-wrap {
        width: 46%;
        height: 54%;
      }

      .student {
        width: min(82%, 130px);
        height: min(82%, 180px);
      }

      .col-stats {
        flex: 1 1 auto;
        max-width: 100%;
        width: 100%;
        min-height: 0;
      }

      .stat-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 横屏：左 55% 环绕 + 右属性 */
    @media (min-width: 721px) and (orientation: landscape) {
      .main-row {
        flex-direction: row;
      }

      .col-figure-ring {
        flex: 0 0 55%;
        max-width: 55%;
      }

      .col-stats {
        flex: 1 1 0;
        min-width: 0;
      }
    }

    /* 极小屏字体下限 */
    @media (max-width: 320px) {
      body { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="screen-bg" aria-hidden="true"></div>

    <header class="top-bar">
      <button type="button" class="btn-back" id="btnBack">← 返回</button>
      <div class="top-title">装备</div>
      <div class="coins-bar"><span aria-hidden="true">💰</span><span id="coinDisplay">1280</span></div>
    </header>

    <div class="main-row">
      <section class="col-figure-ring" aria-label="角色与装备槽位">
        <div class="equip-arena">
          <svg class="equip-links" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <line class="link-line" x1="50" y1="50" x2="50" y2="9" />
            <line class="link-line" x1="50" y1="50" x2="22" y2="20" />
            <line class="link-line" x1="50" y1="50" x2="11" y2="50" />
            <line class="link-line" x1="50" y1="50" x2="22" y2="80" />
            <line class="link-line" x1="50" y1="50" x2="50" y2="91" />
            <line class="link-line" x1="50" y1="50" x2="78" y2="80" />
            <line class="link-line" x1="50" y1="50" x2="90" y2="50" />
          </svg>
          <div class="figure-wrap">
            <div class="figure-glow" aria-hidden="true"></div>
            <div class="student" id="studentFig">
              <img class="student-img" src="assets/player/freeknight_idle_0.png" alt="玩家角色" />

              <span class="equip-hotspot hotspot-helmet on" data-slot="helmet"></span>
              <span class="equip-hotspot hotspot-armor on" data-slot="armor"></span>
              <span class="equip-hotspot hotspot-bracer-l on" data-slot="bracers"></span>
              <span class="equip-hotspot hotspot-bracer-r on" data-slot="bracers"></span>
              <span class="equip-hotspot hotspot-leg on" data-slot="legs"></span>
              <span class="equip-hotspot hotspot-shoe on" data-slot="shoes"></span>
              <span class="equip-hotspot hotspot-glove" data-slot="gloves"></span>
            </div>
          </div>
          <nav class="slot-ring" aria-label="装备槽位">
            <div class="slot-list" id="slotList"></div>
          </nav>
        </div>
        <div class="char-meta">
          <div class="char-name">林小小</div>
          <div class="char-rank">Lv5 · 「学习委员」</div>
        </div>
      </section>

      <aside class="col-stats" aria-label="属性与详情">
        <div class="stats-panel">
          <div class="power-row">
            <span class="power-label">⚔️ 战斗力</span>
            <span class="power-num" id="powerNum">346</span>
          </div>

          <div class="stat-grid" id="totalStats">
            <div class="stat-cell">❤️ 生命 <span class="val">+1</span></div>
            <div class="stat-cell">⚔️ 攻击 <span class="val">8</span></div>
            <div class="stat-cell">🛡️ 防御 <span class="val">5.0</span></div>
            <div class="stat-cell">📏 射程 <span class="val">3格</span></div>
            <div class="stat-cell">⚡ 攻速 <span class="val">0.32s</span></div>
          </div>

          <div class="hr"></div>

          <div class="detail-block visible" id="detailBlock">
            <div class="detail-title" id="detailTitle">学习委员钢笔</div>
            <div class="detail-meta" id="detailMeta">Lv5 · 品质「学习委员」</div>
            <div class="detail-lines" id="detailLines">
              攻击 8<br>
              射程 3 格<br>
              攻速 0.32s
            </div>
            <button type="button" class="btn-upgrade-inline" id="btnUpgradeDetail">
              强化升级 · 💰 200
            </button>
          </div>

          <div class="set-box">
            <h4>套装加成</h4>
            <div>🎒 <strong>3件套</strong>：防御 +2</div>
            <div>🎒 <strong>6件套</strong>：血量 +10 · 攻击 +5</div>
          </div>
        </div>
      </aside>
    </div>

    <footer class="bottom-bar" id="bottomBar">
      <button type="button" class="btn-primary" id="btnMain">强化</button>
      <button type="button" class="btn-secondary" id="btnSecondary">卸下</button>
    </footer>
  </div>

  <script>
    (function () {
      var COINS = 1280;

      function tierClass(lv) {
        if (lv >= 19) return 'tier-purple';
        if (lv >= 13) return 'tier-blue';
        if (lv >= 7) return 'tier-green';
        return 'tier-white';
      }

      var slots = [
        {
          id: 'weapon',
          label: '武器',
          emoji: '🖋️',
          empty: false,
          lv: 5,
          titleShort: '「学习委员」钢笔',
          titleFull: '学习委员钢笔',
          qualityName: '学习委员',
          lines: ['攻击 8', '射程 3 格', '攻速 0.32s'],
          strengthenCost: 200,
          weapon: true
        },
        {
          id: 'helmet',
          label: '头盔',
          emoji: '⛑️',
          empty: false,
          lv: 3,
          titleShort: '「课代表」头盔',
          titleFull: '课代表头盔',
          qualityName: '课代表',
          lines: ['防御 1.5'],
          strengthenCost: 200,
          weapon: false
        },
        {
          id: 'armor',
          label: '护甲',
          emoji: '🛡️',
          empty: false,
          lv: 4,
          titleShort: '「班干部」护甲',
          titleFull: '班干部护甲',
          qualityName: '班干部',
          lines: ['防御 2.0', '血量 +1'],
          strengthenCost: 200,
          weapon: false
        },
        {
          id: 'bracers',
          label: '护腕',
          emoji: '🩹',
          empty: false,
          lv: 2,
          titleShort: '「小组长」护腕',
          titleFull: '小组长护腕',
          qualityName: '小组长',
          lines: ['防御 1.0'],
          strengthenCost: 200,
          weapon: false
        },
        {
          id: 'legs',
          label: '护腿',
          emoji: '🦿',
          empty: false,
          lv: 1,
          titleShort: '「同学」护腿',
          titleFull: '同学护腿',
          qualityName: '同学',
          lines: ['防御 0.5'],
          strengthenCost: 200,
          weapon: false
        },
        {
          id: 'shoes',
          label: '鞋',
          emoji: '👟',
          empty: false,
          lv: 2,
          titleShort: '「小组长」运动鞋',
          titleFull: '小组长运动鞋',
          qualityName: '小组长',
          lines: ['防御 1.0'],
          strengthenCost: 200,
          weapon: false
        },
        {
          id: 'gloves',
          label: '手套',
          emoji: '🧤',
          empty: true,
          lv: 0,
          titleShort: '',
          titleFull: '',
          qualityName: '',
          lines: [],
          strengthenCost: 0,
          weapon: false
        }
      ];

      var slotListEl = document.getElementById('slotList');
      var detailTitle = document.getElementById('detailTitle');
      var detailMeta = document.getElementById('detailMeta');
      var detailLines = document.getElementById('detailLines');
      var detailBlock = document.getElementById('detailBlock');
      var btnUpgradeDetail = document.getElementById('btnUpgradeDetail');
      var btnMain = document.getElementById('btnMain');
      var btnSecondary = document.getElementById('btnSecondary');
      // weapon emoji removed
      var selectedIndex = 0;

      function renderSlots() {
        slotListEl.innerHTML = '';
        slots.forEach(function (s, idx) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'slot-btn';
          if (s.weapon) btn.classList.add('weapon-slot');
          if (s.empty) {
            btn.classList.add('empty');
            btn.setAttribute('aria-label', s.label + ' 空槽');
          } else {
            btn.classList.add('equipped');
            btn.setAttribute('aria-label', s.label + ' ' + s.titleShort + ' Lv' + s.lv);
          }
          btn.dataset.index = String(idx);
          btn.classList.add('slot-pos-' + s.id);

          var emoji = document.createElement('span');
          emoji.className = 'slot-emoji';
          emoji.textContent = s.emoji;
          emoji.setAttribute('aria-hidden', 'true');
          btn.appendChild(emoji);

          if (!s.empty) {
            var lv = document.createElement('span');
            lv.className = 'slot-lv ' + tierClass(s.lv);
            lv.textContent = 'Lv' + s.lv;
            btn.appendChild(lv);
          }

          if (idx === selectedIndex) btn.classList.add('selected');

          btn.addEventListener('click', function () {
            selectedIndex = idx;
            renderSlots();
            updateDetail();
          });

          slotListEl.appendChild(btn);
        });
      }

      function updateHotspots() {
        var equippedMask = {
          helmet: !slots[1].empty,
          armor: !slots[2].empty,
          bracers: !slots[3].empty,
          legs: !slots[4].empty,
          shoes: !slots[5].empty,
          gloves: !slots[6].empty
        };
        document.querySelectorAll('.equip-hotspot').forEach(function (el) {
          var key = el.getAttribute('data-slot');
          if (equippedMask[key]) el.classList.add('on');
          else el.classList.remove('on');
        });
      }

      function updateDetail() {
        var s = slots[selectedIndex];
        detailBlock.classList.remove('visible');
        void detailBlock.offsetWidth;

        if (s.empty) {
          detailTitle.textContent = s.label + ' — 未装备';
          detailMeta.textContent = '点击下方购买获取装备';
          detailLines.innerHTML = '该槽位暂无道具。';
          btnUpgradeDetail.style.display = 'none';

          btnMain.textContent = '购买';
          btnMain.className = 'btn-buy';
          btnSecondary.style.display = 'none';
        } else {
          btnUpgradeDetail.style.display = '';
          detailTitle.textContent = s.titleFull;
          detailMeta.textContent = 'Lv' + s.lv + ' · 品质「' + s.qualityName + '」';
          detailLines.innerHTML = s.lines.join('<br>');
          btnUpgradeDetail.textContent = '强化升级 · 💰 ' + s.strengthenCost;

          btnMain.textContent = '强化';
          btnMain.className = 'btn-primary';
          btnSecondary.style.display = '';

        }

        var w = slots[0];
        // weapon emoji removed - using player sprite now

        detailBlock.classList.add('visible');
        updateHotspots();
      }

      document.getElementById('btnBack').addEventListener('click', function () {
        if (history.length > 1) history.back();
      });

      btnUpgradeDetail.addEventListener('click', function () {
        var s = slots[selectedIndex];
        if (!s.empty && COINS >= s.strengthenCost) {
          COINS -= s.strengthenCost;
          document.getElementById('coinDisplay').textContent = String(COINS);
        }
      });

      btnMain.addEventListener('click', function () {
        var s = slots[selectedIndex];
        if (s.empty) {
          alert('原型：打开商店购买手套');
          return;
        }
        if (COINS >= s.strengthenCost) {
          COINS -= s.strengthenCost;
          document.getElementById('coinDisplay').textContent = String(COINS);
        }
      });

      btnSecondary.addEventListener('click', function () {
        var s = slots[selectedIndex];
        if (!s.empty && !s.weapon) {
          alert('原型：卸下「' + s.titleFull + '」');
        } else if (s.weapon) {
          alert('原型：武器不可卸下');
        }
      });

      renderSlots();
      updateDetail();
    })();
  </script>
</body>
</html>
